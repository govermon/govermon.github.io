<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>amsler-tracker start</title>
    <meta name="description" content="Entry page for amsler-tracker.">
    <style>
      :root {
        color-scheme: light;
        --ink: #13242b;
        --accent: #0b5f7a;
        --accent-strong: #08485d;
        --paper: rgba(255, 255, 255, 0.86);
        --line: rgba(19, 36, 43, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        background:
          radial-gradient(circle at top, rgba(215, 225, 230, 0.95), transparent 45%),
          linear-gradient(180deg, #f5efe3 0%, #d7e1e6 100%);
        color: var(--ink);
        font-family: "Avenir Next", "Gill Sans", "Trebuchet MS", sans-serif;
      }

      main {
        width: min(28rem, 100%);
        padding: 2.75rem 2rem;
        border: 1px solid var(--line);
        border-radius: 1.5rem;
        background: var(--paper);
        box-shadow: 0 20px 60px rgba(19, 36, 43, 0.16);
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 4vw, 2.8rem);
        line-height: 1.05;
      }

      .actions {
        display: flex;
        justify-content: center;
        margin-top: 1.75rem;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 10rem;
        padding: 0.85rem 1.3rem;
        border-radius: 999px;
        background: var(--accent);
        color: #ffffff;
        font-weight: 700;
        text-decoration: none;
      }

      .button:hover,
      .button:focus-visible {
        background: var(--accent-strong);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>amsler-tracker</h1>
      <div class="actions">
        <a class="button" href="http://35.238.159.181">Enter</a>
      </div>
    </main>
  </body>
</html>
